<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Olympus Garments</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="images/logo.png" alt="Olympus Logo" class="logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>
  <section class="contact">
    <h1>Contact Us</h1>
    <p>We value your feedback and inquiries. Please reach out to us below.</p>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Write your message here..." required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <div class="contact-info">
      <p><strong>Email:</strong> info@olympusgarments.com</p>
      <p><strong>Address:</strong> 2036 Morwa streetview, Gaborone City</p>
    </div>
  </section>
  <footer>
    <p>&copy; 2026 Olympus Garments</p>
  </footer>
</body>
</html>
